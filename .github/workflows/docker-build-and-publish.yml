---
name: Create and publish a Docker image for every release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_GALAXY: fortytwoservices/swaggerimporter

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Extract metadata (tags, labels) for container
      # if the event that triggered the workflow is a release
      - name: Release Galaxy, Extract metadata (tags, labels)
        id: meta_release_galaxy
        if: github.event_name == 'release'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GALAXY }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      # Build and push the Docker image
      # if the event that triggered the workflow is a release
      - name: Release Galaxy, Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        if: github.event_name == 'release'
        with:
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_release_galaxy.outputs.tags }}
          labels: ${{ steps.meta_release_galaxy.outputs.labels }}
          annotations: ${{ steps.meta_release_galaxy.outputs.annotations }}
          outputs: type=image,oci-mediatypes=true
